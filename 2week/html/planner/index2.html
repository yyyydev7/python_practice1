<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKALA 스터디 플래너</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1 class="logo">SKALA 스터디 플래너</h1>
        <p class="today" id="today">2026년 7월 17일</p>
    </header>
    
<main class="container">
    <section class="panel" aria-labelledby="form-title">
        <h2 id="form-title" class="panel-title">학습 목표 추가</h2>
        <form class="form" id="goal-form">
            <label class="sr-only" for="goal-input">학습 목표</label>
            <input class="form-input" id="goal-input" type="text" 
                placeholder="오늘 공부할 내용을 입력하세요" required>
            <label class="sr-only" for="goal-category">분류</label>
            <select class="form-select" id="goal-category">
                <option value="HTML">HTML</option>
                <option value="CSS">CSS</option>
                <option value="JS">JavaScript</option>
            </select>
            <button class="btn btn-primary" type="submit">추가</button>
        </form>
        <p class="form-error" id="form-error" hidden>
            목표를 한 글자 이상 입력해 주세요.</p>
    </section>

    <section class="panel" aria-labelledy="list-title">
        <div class="panel-head">
            <h2 id="list-title" class="panel-title">학습 목록</h2>
            <div class="tabs" id="filter-tabs" role="group" aria-label="목록 필터">
                <button class="tab is-active" type="button" data-filter="all">전체</button>
                <button class="tab" type="button" data-filter="active">진행중</button>
                <button class="tab" type="button" data-filter="done">완료</button>
            </div>
        </div>
        <ul class="list" id="goal-list"></ul>
        <p class ="list-empty" id="list-empty">아직 등록된 목표가 없습니다.</p>
        <div class="progress">
            <div class="progress-bar">
            <span class="progress-fill" id="progress-fill"></span>
            </div>
            <p class="progress-text" id="progress-text">전체 0개 중 0개 완료</p>
        </div>
    </section>

    <section class="panel panel-tip">
        <h2 class="panel-title">오늘의 팁</h2>
        <p class="tip" id="tip">불러오는 중...</p>
    </section>
</main>

<footer class="footer">
    <p>&copy; 2026 SKALA KDT 프로그래밍 기초</p>
</footer>

    <script src="js/app.js"></script>
</body>
</html>
